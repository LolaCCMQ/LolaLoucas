<style>

    --line:#ECE3D9; --brand:#A82A2A; --brand-d:#7E1E1F; --ok:#2E6B45;
    --warn:#C94040; --danger:#A82A2A; --chip:#F6E7E5; --warm:#F4ECE4;
    --body:#5A463E; --label:#B79A8E; --grad:linear-gradient(135deg,#B5302E,#7E1E1F);

  *{box-sizing:border-box}

  .hdr-title{font-family:var(--serif);font-style:normal;font-weight:600;font-size:20px;color:var(--brand);line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hdr-sub{color:#8A7A72;font-size:12px;font-weight:600;margin-top:1px;min-height:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hdr-add{flex:0 0 auto;width:42px;height:42px;border-radius:50%;border:0;background:#fff;color:var(--brand);
           font-size:24px;line-height:1;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center}
  .hdr-add:hover{background:#fff5f2}

  nav button i{font-size:16px}
  nav button:hover{background:var(--warm)}
  nav button:hover{background:rgba(255,255,255,.26)}
  nav button.active{background:var(--brand);color:#fff;font-weight:700;box-shadow:none}
  main h2{font-family:var(--serif);font-style:normal;font-weight:600;color:var(--ink)}
  main{max-width:1500px;margin:0;padding:16px 20px 80px}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  input,select,textarea{font:inherit;color:var(--ink);background:var(--card);border:1px solid var(--line);

  input:focus,select:focus,textarea:focus{border-color:var(--brand)}
  .search{flex:1;min-width:160px}
  .btn{border:0;background:var(--grad);color:#fff;font-weight:700;font-size:14px;padding:10px 16px;
       border-radius:10px;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
  .btn:hover{background:var(--brand-d)}
  .btn.ghost{background:var(--chip);color:var(--ink)}

  .btn.danger{background:var(--danger)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:var(--shadow)}

  .thumb-sm{width:42px;height:42px;border-radius:8px;object-fit:cover;display:block;background:var(--warm)}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
         padding:11px 18px;border-radius:10px;font-size:14px;font-weight:600;z-index:99;opacity:0;

  .checkwrap input{width:18px;height:18px;accent-color:var(--ok)}

  .setup{max-width:640px;margin:60px auto;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:26px;box-shadow:var(--shadow)}

  .mc-name{flex:1 1 auto;min-width:0;font-family:var(--serif);font-style:normal;font-weight:600;font-size:1.12rem;color:var(--ink);line-height:1.2;cursor:pointer}

  .mc-qty.baixo{color:#c2453f}
  .mc-qty .minlbl{font-size:9px;font-weight:600;color:var(--muted);margin-top:2px}
  .mc-qty.baixo .minlbl{color:#c2453f}
  .mc-medida{color:var(--muted);font-size:13px;margin-top:3px}
  .mc-body{display:flex;align-items:flex-start;gap:12px;margin-top:11px}
  .mc-foto{flex:0 0 72px;width:72px;height:72px;border-radius:12px;background:var(--warm);overflow:hidden;display:flex;align-items:center;justify-content:center}
  .mc-foto img{width:100%;height:100%;object-fit:cover;display:block}
  .mc-col{flex:1 1 auto;min-width:0}
  .mc-chips{display:flex;flex-wrap:wrap;gap:7px}
  .mc-meta{font-size:13px;color:var(--body)}
  .mc-chips + .mc-meta{margin-top:10px}
  .mc-meta + .mc-meta{margin-top:3px}
  .mc-meta span{color:var(--label);font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:10.5px;margin-right:3px}
  .mc-actions{text-align:right;margin-top:12px;border-top:1px solid #f0e6e6;padding-top:10px}
  .mc-actions .iconbtn{font-size:19px;padding:5px 9px;margin-left:5px}
  @media(max-width:560px){
    .field2{grid-template-columns:1fr}
    .bar{display:flex;align-items:center;flex-wrap:nowrap;gap:10px;padding:12px 15px}
    header{border-bottom:none}
    /* menu: tudo numa linha so */
    nav{width:100%;margin-left:0;overflow:visible;gap:3px;flex-wrap:nowrap}
    nav button{flex:1 1 0;min-width:0;white-space:nowrap;padding:7px 3px;font-size:11px;border-radius:999px;min-height:40px}
    /* filtros menores, ~3 por linha */
    .toolbar{gap:7px}
    .toolbar .search{flex:1 1 100%;min-width:0;padding:8px 11px;font-size:13px}
    .toolbar select{flex:1 1 calc(33.33% - 5px);min-width:0;padding:8px 7px;font-size:12px}
    .toolbar .btn{flex:1 1 calc(50% - 4px);justify-content:center;padding:9px 10px;font-size:13px}
    /* catalogo: no celular esconde a tabela e mostra os cartoes */
    .tablewrap{display:none}
    .cardlist{display:flex;flex-direction:column}
    .modal{max-width:100%;border-radius:14px;padding:16px}
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
    .btn,.checkwrap input{min-height:44px}
    .count-row input{width:72px;height:42px}
    .fab{display:none}
    main{padding-bottom:96px}
  }
</style>

<body>

    <button class="hdr-ic" id="hdrAdd" title="Adicionar"><i class="ph-duotone ph-plus"></i></button>

    <button data-view="eventos"><i class="ph-duotone ph-calendar-dots"></i>Eventos</button>

<main id="main"><div class="empty">Carregando…</div></main>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>
<button class="fab" id="fab" title="Adicionar">+</button>

<script>
/* ============================================================
   CONFIGURAÇÃO — preencher com os dados do seu projeto Supabase
   (Project Settings → API)
   ============================================================ */
const SUPABASE_URL  = "https://mvjbsdpfjhywhaonvpfl.supabase.co";
const SUPABASE_ANON = "sb_publishable_VMJzYe1AwL9zEoFs-ljUIw_OOkDpqhy";
/* ============================================================ */

let sb = null;
const configured = SUPABASE_URL.indexOf("http") === 0;
if (configured) sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const $ = (s,el=document)=>el.querySelector(s);
const main = $("#main");
const overlay = $("#overlay");
const modal = $("#modal");
let state = { view:"catalogo", items:[], q:"", fSupplier:"", fColor:"", fUnidade:"", fLocal:"", fCategoria:"", pendingPhoto:null };
const UNIDADES = ["Lola CCMQ","Central","Lola MAC"];
const UNIDADE_COR = {"Lola CCMQ":"#A8272A","Central":"#2D6A4F","Lola MAC":"#1A5276"};
const LOCAIS = ["Em uso MAC","Em uso Lola","Em uso Central","Depósito Central","Depósito MAC","Calabouço","Depósito Bebidas","Escritório"];

// Redimensiona/comprime a foto no próprio celular antes de enviar (rápido no 4G)
function compressImage(file, maxDim=1280, quality=0.82){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width, h=img.height;
      if(w>h && w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}
      else if(h>=w && h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      c.toBlob(b=>resolve(b||file),"image/jpeg",quality);
    };
    img.onerror=()=>resolve(file);
    img.src=URL.createObjectURL(file);
  });
}

function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2200);}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function openModal(html){modal.innerHTML=html;overlay.classList.add("open");}
function closeModal(){if(window._stopCamera){try{window._stopCamera();}catch(e){}}overlay.classList.remove("open");modal.innerHTML="";}
overlay.addEventListener("click",e=>{if(e.target===overlay)closeModal();});

/* ---------- Navegação ---------- */
$("#nav").addEventListener("click",e=>{
  const b=e.target.closest("button");if(!b)return;
  document.querySelectorAll("#nav button").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");state.view=b.dataset.view;render();
});
function primaryAction(){
  if(state.view==="catalogo")itemForm();
  else if(state.view==="eventos")eventoForm();
  else if(state.view==="contagens")novaContagem();
  else if(state.view==="pedidos")pedidoForm();
  else if(state.view==="quebras")quebraForm();
}
$("#fab").addEventListener("click",primaryAction);
$("#hdrAdd").addEventListener("click",primaryAction);

function render(){
  if(!configured){renderSetup();return;}
  const _subs={catalogo:"Catálogo de louças e utensílios",contagens:"Contagens de estoque",eventos:"Louças por evento",pedidos:"Pedidos de compra",quebras:"Registro de quebras"};
  const _hs=document.getElementById("hdrSub"); if(_hs)_hs.textContent=_subs[state.view]||"";
  if(state.view==="catalogo")renderCatalogo();
  else if(state.view==="contagens")renderContagens();
  else if(state.view==="eventos")renderEventos();
  else if(state.view==="pedidos")renderPedidos();
  else if(state.view==="quebras")renderQuebras();
}

function renderSetup(){
  main.innerHTML=`<div class="setup">
    <h2>⚙️ Falta conectar ao banco de dados</h2>
    <p>Este app precisa do endereço e da chave pública do seu projeto Supabase. Abra o arquivo
    <code>inventario-lola.html</code> e substitua, no topo do script:</p>
    <p><code>SUPABASE_URL</code> → a URL do projeto<br>
       <code>SUPABASE_ANON</code> → a chave <b>anon / publishable</b></p>
    <p class="mini">Ambos ficam em <b>Project Settings → API</b> no painel do Supabase.
    Se eu (Claude) configurar para você, este aviso some sozinho.</p>
  </div>`;
}

/* ============================================================
   CATÁLOGO
   ============================================================ */
async function loadItems(){
  const {data,error}=await sb.from("lola_loucas_itens").select("*").order("name");
  if(error){toast("Erro ao carregar itens");console.error(error);return[];}
  state.items=data||[];return state.items;
}

async function renderCatalogo(){
  main.innerHTML=`<div class="empty">Carregando catálogo…</div>`;
  await loadItems();
  const suppliers=[...new Set(state.items.map(i=>i.supplier).filter(Boolean))].sort();
  const colors=[...new Set(state.items.map(i=>i.color).filter(Boolean))].sort();
  const categorias=[...new Set(state.items.map(i=>i.category).filter(Boolean))].sort();
  const q=state.q.toLowerCase();
  const filtered=state.items.filter(i=>{
    const hit=!q||[i.name,i.reference,i.supplier,i.color,i.category,i.local,i.unidade,i.medida].some(v=>(v||"").toLowerCase().includes(q));
    return hit && (!state.fSupplier||i.supplier===state.fSupplier) && (!state.fColor||i.color===state.fColor) && (!state.fUnidade||i.unidade===state.fUnidade) && (!state.fLocal||i.local===state.fLocal) && (!state.fCategoria||i.category===state.fCategoria);
  });
  main.innerHTML=`
    <div class="toolbar">
      <input class="search" id="q" placeholder="Buscar nome, referência, fornecedor…" value="${esc(state.q)}">
      <select id="fSupplier"><option value="">Todos fornecedores</option>

      <select id="fColor"><option value="">Todas as cores</option>
        ${colors.map(c=>`<option ${c===state.fColor?"selected":""}>${esc(c)}</option>`).join("")}</select>
      <select id="fUnidade"><option value="">Todas as unidades</option>

      <select id="fLocal"><option value="">Todos os locais</option>

      <button class="btn ghost" id="imprimir">🖨️ Imprimir contagem</button>
      <button class="btn" id="novoItem">+ Novo item</button>
    </div>
    ${filtered.length? `<div class="tablewrap"><table class="grid-table"><thead><tr><th></th><th>Nome</th><th>Medida</th><th>Qtd</th><th>Local</th><th>Unidade</th><th>Categoria</th><th>Fornecedor</th><th>Ref</th><th>Cor</th><th></th></tr></thead><tbody>${filtered.map(rowItem).join("")}</tbody></table></div><div class="cardlist">${filtered.map(cardItem).join("")}</div>`
      : `<div class="empty"><div>Nenhum item ${state.items.length?"encontrado":"cadastrado ainda"}.</div></div>`}
    <p class="mini" style="margin-top:14px">${filtered.length} de ${state.items.length} itens · estoque total: ${state.items.reduce((a,i)=>a+(i.quantity||0),0)} peças</p>`;
  $("#q").addEventListener("input",e=>{state.q=e.target.value;clearTimeout(window._qt);window._qt=setTimeout(renderCatalogo,250);});
  $("#fSupplier").addEventListener("change",e=>{state.fSupplier=e.target.value;renderCatalogo();});
  $("#fColor").addEventListener("change",e=>{state.fColor=e.target.value;renderCatalogo();});
  $("#fUnidade").addEventListener("change",e=>{state.fUnidade=e.target.value;renderCatalogo();});
  $("#fLocal").addEventListener("change",e=>{state.fLocal=e.target.value;renderCatalogo();});
  $("#fCategoria").addEventListener("change",e=>{state.fCategoria=e.target.value;renderCatalogo();});
  $("#imprimir").addEventListener("click",()=>imprimirContagem(filtered));
  $("#novoItem").addEventListener("click",()=>itemForm());
  {const _hs=document.getElementById("hdrSub"); if(_hs)_hs.textContent=`${filtered.length} ${filtered.length===1?'item':'itens'} · ${filtered.reduce((a,i)=>a+(i.quantity||0),0)} peças`;}
  main.querySelectorAll("[data-edit]").forEach(b=>b.addEventListener("click",()=>itemForm(b.dataset.edit)));
  main.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",()=>delItem(b.dataset.del)));
}

    <td data-label="Qtd" class="tcell-qtd ${(i.estoque_minimo!=null && (i.quantity||0) < i.estoque_minimo)?'baixo':''}">${i.quantity||0}${(i.estoque_minimo!=null)?`<div class="minlbl">${((i.quantity||0)<i.estoque_minimo)?"⚠ ":""}mín ${i.estoque_minimo}</div>`:""}</td>

async function saveItem(id){
  const btn=$("#saveItem");btn.disabled=true;btn.textContent="Salvando…";
  try{
    const name=$("#f_name").value.trim();
    if(!name){toast("Informe o nome");btn.disabled=false;btn.textContent="Salvar";return;}
    const unidade=$("#f_unidade").value;
    if(!unidade){toast("Selecione a unidade (Lola CCMQ, Central ou Lola MAC)");btn.disabled=false;btn.textContent="Salvar";return;}
    const local=$("#f_local").value;
    let photo_url=id?(state.items.find(x=>x.id===id)||{}).photo_url:null;
    const file=state.pendingPhoto;
    if(file){
      const path=`itens/${Date.now()}_${Math.random().toString(36).slice(2,7)}.jpg`;
      const {error:upErr}=await sb.storage.from("loucas").upload(path,file,{upsert:true,contentType:"image/jpeg"});
      if(upErr)throw upErr;
      photo_url=sb.storage.from("loucas").getPublicUrl(path).data.publicUrl;
    }
    const payload={
      name, unidade, local, medida:$("#f_medida").value.trim()||null, reference:$("#f_reference").value.trim()||null,
      supplier:$("#f_supplier").value.trim()||null, color:$("#f_color").value.trim()||null,
      category:$("#f_category").value.trim()||null, quantity:parseInt($("#f_quantity").value||"0",10),
      estoque_minimo:$("#f_min").value!==""?parseInt($("#f_min").value,10):null,
      notes:$("#f_notes").value.trim()||null, photo_url, updated_at:new Date().toISOString()
    };
    const {error}= id? await sb.from("lola_loucas_itens").update(payload).eq("id",id)
                      : await sb.from("lola_loucas_itens").insert(payload);
    if(error)throw error;
    closeModal();toast(id?"Item atualizado":"Item cadastrado");renderCatalogo();
  }catch(err){console.error(err);toast("Erro ao salvar: "+(err.message||""));btn.disabled=false;btn.textContent="Salvar";}
}

async function delItem(id){
  if(!confirm("Excluir este item do catálogo?"))return;
  const {error}=await sb.from("lola_loucas_itens").delete().eq("id",id);
  if(error){toast("Erro ao excluir");return;}
  toast("Item excluído");renderCatalogo();
}

function imprimirContagem(items){
  const cat=state.fCategoria||"Todas as categorias";
  const hoje=new Date().toLocaleDateString("pt-BR");
  const linhas=items.map(i=>`<tr><td>${esc(i.name)}</td><td>${esc(i.medida||"")}</td><td>${esc(i.local||"")}</td><td>${esc(i.unidade||"")}</td><td>${esc(i.category||"")}</td><td class="c">${i.quantity||0}</td><td class="c"></td><td class="c"></td></tr>`).join("");
  const css="*{font-family:Arial,Helvetica,sans-serif;-webkit-print-color-adjust:exact;print-color-adjust:exact}h1{font-size:18px;margin:0 0 2px;color:#A8272A}.sub{font-size:12px;color:#444;margin-bottom:12px}table{width:100%;border-collapse:collapse;font-size:12px}th,td{border:1px solid #888;padding:5px 7px;text-align:left}th{background:#f1ebe2}td.c{text-align:center}tbody tr td{height:24px}.foot{margin-top:22px;font-size:12px}@page{margin:12mm}";
  const html=`<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><title>Contagem - ${esc(cat)}</title><style>${css}</style></head><body><h1>Contagem · Louças e Utensílios</h1><div class="sub">Categoria: <b>${esc(cat)}</b> · ${items.length} itens · ${hoje}</div><table><thead><tr><th>Item</th><th>Medida</th><th>Local</th><th>Unidade</th><th>Categoria</th><th>Sistema</th><th>Contado</th><th>Dif.</th></tr></thead><tbody>${linhas}</tbody></table><div class="foot">Conferido por: __________________________&nbsp;&nbsp;&nbsp; Assinatura: __________________________</div><scr`+`ipt>window.onload=function(){setTimeout(function(){window.print();},250);};</scr`+`ipt></body></html>`;
  const w=window.open("","_blank");
  if(!w){toast("Permita pop-ups para imprimir a contagem");return;}
  w.document.open();w.document.write(html);w.document.close();
}

async function loadMov(id){
  const el=$("#movList"); if(!el)return;
  const {data}=await sb.from("lola_loucas_movimentacoes").select("*").eq("item_id",id).order("data",{ascending:false}).order("created_at",{ascending:false});
  if(!data||!data.length){el.innerHTML='<div class="mini">Nenhuma movimentação registrada ainda.</div>';return;}
  el.innerHTML=data.map(m=>{
    const cls=(m.tipo||'').toLowerCase().replace(/[^a-z]/g,'');
    return `<div class="movrow"><span class="movtag tipo-${cls}">${esc(m.tipo||'')}</span> <b>${m.quantidade} un</b> ${m.destino?'→ '+esc(m.destino):''} <span class="mini">· ${m.data?new Date(m.data+"T00:00").toLocaleDateString("pt-BR"):''}${m.obs?' · '+esc(m.obs):''}</span></div>`;
  }).join("");
}

async function registrarMov(id){
  const tipo=$("#m_tipo").value; const q=parseInt($("#m_qtd").value||"0",10);
  if(!q||q<1){toast("Informe a quantidade da movimentação");return;}
  const mov={item_id:id,tipo,quantidade:q,destino:$("#m_destino").value||null,data:$("#m_data").value||new Date().toISOString().slice(0,10),obs:$("#m_obs").value.trim()||null};
  const {error}=await sb.from("lola_loucas_movimentacoes").insert(mov);
  if(error){toast("Erro ao registrar: "+(error.message||""));return;}
  if($("#m_baixa")&&$("#m_baixa").checked){
    const cur=parseInt($("#f_quantity").value||"0",10);
    const novo=tipo==="Entrada"?cur+q:Math.max(0,cur-q);
    $("#f_quantity").value=novo;
    await sb.from("lola_loucas_itens").update({quantity:novo,updated_at:new Date().toISOString()}).eq("id",id);
  }
  $("#m_obs").value=""; $("#m_qtd").value="1";
  toast("Movimentação registrada"); loadMov(id); renderCatalogo();
}

async function renderContagens(){
  main.innerHTML=`<div class="empty">Carregando contagens…</div>`;
  const {data:sessions}=await sb.from("lola_loucas_contagens").select("*").order("created_at",{ascending:false});
  main.innerHTML=`
    <div class="toolbar">
      <div><h2 style="margin:0;font-size:18px">Contagens de inventário</h2>
        <div class="mini">Inicie uma contagem, registre as quantidades e guarde o histórico.</div></div>
      <div class="spacer"></div>
      <button class="btn" id="novaContagem">+ Nova contagem</button>
    </div>
    ${(sessions&&sessions.length)? `<div class="list">${sessions.map(s=>`
      <div class="listitem" data-open="${s.id}">
        <div style="flex:1">
          <div style="font-weight:700">${esc(s.name)}</div>
          <div class="mini">Criada em ${new Date(s.created_at).toLocaleDateString("pt-BR")}${s.closed_at?` · fechada em ${new Date(s.closed_at).toLocaleDateString("pt-BR")}`:""}</div>

        <span class="badge ${s.status}">${s.status}</span>
      </div>`).join("")}</div>`
      : `<div class="empty">Nenhuma contagem ainda. Crie a primeira!</div>`}`;
  $("#novaContagem").addEventListener("click",novaContagem);
  main.querySelectorAll("[data-open]").forEach(b=>b.addEventListener("click",()=>abrirContagem(b.dataset.open)));
}

async function novaContagem(){
  const def="Contagem "+new Date().toLocaleDateString("pt-BR");
  const name=prompt("Nome da contagem:",def);if(name===null)return;
  await loadItems();
  const {data:sess,error}=await sb.from("lola_loucas_contagens").insert({name:name.trim()||def}).select().single();
  if(error){toast("Erro ao criar");return;}
  if(state.items.length){
    const rows=state.items.map(i=>({session_id:sess.id,item_id:i.id,expected_quantity:i.quantity,counted_quantity:null}));
    await sb.from("lola_loucas_contagem_itens").insert(rows);
  }
  toast("Contagem iniciada");abrirContagem(sess.id);
}

async function abrirContagem(id){
  main.innerHTML=`<div class="empty">Abrindo contagem…</div>`;

    .select("*, items:lola_loucas_itens(name,reference,supplier,photo_url)").eq("session_id",id);
  entries.sort((a,b)=>(a.items?.name||"").localeCompare(b.items?.name||""));
  const closed=sess.status==="fechada";
  main.innerHTML=`
    <button class="back" id="back">← Voltar</button>
    <div class="row" style="margin-bottom:6px">
      <h2 style="margin:0;font-size:19px">${esc(sess.name)}</h2>
      <span class="badge ${sess.status}">${sess.status}</span>
    </div>
    <div class="mini" style="margin-bottom:14px">${closed?"Contagem fechada — somente leitura.":"Preencha a quantidade contada de cada item. Diferença = contado − esperado."}</div>
    <div class="list" style="background:var(--card);border:1px solid var(--line);border-radius:12px;padding:6px 14px;box-shadow:var(--shadow)">
      ${entries.map(e=>countRow(e,closed)).join("")}
    </div>
    ${closed?"":`<div class="modal-actions" style="margin-top:16px">
      <button class="btn" id="salvarContagem">Salvar contagem</button>
      <button class="btn ghost" id="fecharContagem">Fechar e aplicar ao estoque</button>
    </div>`}`;
  $("#back").addEventListener("click",renderContagens);
  if(!closed){
    main.querySelectorAll("input[data-entry]").forEach(inp=>inp.addEventListener("input",()=>{
      const exp=parseInt(inp.dataset.exp||"0",10);const val=inp.value===""?null:parseInt(inp.value,10);
      const d=$(`#diff_${inp.dataset.entry}`);
      if(val==null){d.textContent="—";d.className="diff zero";}
      else{const diff=val-exp;d.textContent=(diff>0?"+":"")+diff;d.className="diff "+(diff>0?"pos":diff<0?"neg":"zero");}
    }));
    $("#salvarContagem").addEventListener("click",()=>salvarContagem(id,false));
    $("#fecharContagem").addEventListener("click",()=>salvarContagem(id,true));
  }
}

function countRow(e,closed){
  const it=e.items||{};const exp=e.expected_quantity||0;const c=e.counted_quantity;
  let diffTxt="—",diffCls="zero";
  if(c!=null){const d=c-exp;diffTxt=(d>0?"+":"")+d;diffCls=d>0?"pos":d<0?"neg":"zero";}
  return `<div class="count-row">
    <div class="name"><div style="font-weight:600">${esc(it.name)}</div>
      <div class="mini">${it.reference?esc(it.reference)+" · ":""}esperado: ${exp}</div></div>
    ${closed? `<div style="font-weight:700">${c!=null?c:"—"}</div>`
            : `<input type="number" min="0" data-entry="${e.id}" data-exp="${exp}" value="${c!=null?c:""}" placeholder="${exp}">`}
    <div class="diff ${diffCls}" id="diff_${e.id}">${diffTxt}</div>
  </div>`;
}

async function salvarContagem(id,fechar){
  const inputs=[...main.querySelectorAll("input[data-entry]")];
  for(const inp of inputs){
    const val=inp.value===""?null:parseInt(inp.value,10);
    await sb.from("lola_loucas_contagem_itens").update({counted_quantity:val}).eq("id",inp.dataset.entry);
  }
  if(fechar){
    if(!confirm("Fechar a contagem e atualizar o estoque com as quantidades contadas?"))return;
    const {data:entries}=await sb.from("lola_loucas_contagem_itens").select("item_id,counted_quantity").eq("session_id",id);
    for(const e of entries){
      if(e.counted_quantity!=null)
        await sb.from("lola_loucas_itens").update({quantity:e.counted_quantity,updated_at:new Date().toISOString()}).eq("id",e.item_id);
    }
    await sb.from("lola_loucas_contagens").update({status:"fechada",closed_at:new Date().toISOString()}).eq("id",id);
    toast("Contagem fechada e estoque atualizado");renderContagens();
  }else{toast("Contagem salva");}
}

      ${p.status!=='Recebido'?`<button class="btn ghost" id="p_del">Excluir pedido</button>`:`<span class="mini">Pedido concluído ✓ — estoque atualizado.</span>`}

async function receberPedido(id,p,itens){
  if(!confirm("Marcar como recebido e atualizar o estoque (baixa na origem, entrada no destino)?"))return;
  await loadItems();
  for(const it of itens){
    const q=it.quantidade||0; if(q<1)continue;
    const origin=it.item_id?state.items.find(x=>x.id===it.item_id):null;
    if(origin){
      await sb.from("lola_loucas_itens").update({quantity:Math.max(0,(origin.quantity||0)-q),updated_at:new Date().toISOString()}).eq("id",origin.id);
      await sb.from("lola_loucas_movimentacoes").insert({item_id:origin.id,tipo:'Transferência',quantidade:q,origem:origin.local,destino:p.destino_unidade,obs:'Pedido para '+p.destino_unidade});
    }
    const nome=(it.item_nome||(origin&&origin.name)||'').trim().toLowerCase();
    const dest=state.items.find(x=>x.unidade===p.destino_unidade && (x.name||'').trim().toLowerCase()===nome && (!origin||x.id!==origin.id));
    if(dest){
      await sb.from("lola_loucas_itens").update({quantity:(dest.quantity||0)+q,updated_at:new Date().toISOString()}).eq("id",dest.id);
      await sb.from("lola_loucas_movimentacoes").insert({item_id:dest.id,tipo:'Entrada',quantidade:q,destino:dest.local,obs:'Recebido de '+p.origem_unidade});
    }else if(origin){
      const {data:created}=await sb.from("lola_loucas_itens").insert({name:origin.name,reference:origin.reference,supplier:origin.supplier,color:origin.color,category:origin.category,medida:origin.medida,unidade:p.destino_unidade,local:null,quantity:q}).select().single();
      if(created)await sb.from("lola_loucas_movimentacoes").insert({item_id:created.id,tipo:'Entrada',quantidade:q,obs:'Recebido de '+p.origem_unidade+' (novo item criado)'});
    }
  }
  await sb.from("lola_loucas_pedidos").update({status:'Recebido',data_recebido:new Date().toISOString().slice(0,10)}).eq("id",id);
  toast("Pedido recebido — estoque atualizado"); abrirPedido(id);
}

  $("#cancel").addEventListener("click",closeModal);
  $("#q_save").addEventListener("click",async()=>{
    const item_id=$("#q_item").value; const q=parseInt($("#q_qtd").value||"0",10);
    if(!q||q<1){toast("Informe a quantidade");return;}
    const {error}=await sb.from("lola_loucas_movimentacoes").insert({item_id,tipo:'Quebra',quantidade:q,data:$("#q_data").value||new Date().toISOString().slice(0,10),obs:$("#q_obs").value.trim()||null});
    if(error){toast("Erro ao registrar: "+(error.message||""));return;}
    const it=state.items.find(x=>x.id===item_id);
    if(it)await sb.from("lola_loucas_itens").update({quantity:Math.max(0,(it.quantity||0)-q),updated_at:new Date().toISOString()}).eq("id",item_id);
    closeModal();toast("Quebra registrada");renderQuebras();
  });
}

function voltarMenu(){try{if(window.parent&&window.parent!==window){window.parent.postMessage({lola:'voltar-menu'},'*');return;}}catch(e){}try{history.back();}catch(e2){}}
function hdrBusca(){var i=document.querySelector('#main input.search, #main input[type=search], #main input[placeholder*="usc"]');if(i){try{i.scrollIntoView({block:'center',behavior:'smooth'});i.focus();}catch(e){}}}
/* ---------- start ---------- */
render();
</script>
